<!DOCTYPE html>
<html>
<head>
    <title>Pipe Damage Detection AI</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .damaged {
            background: rgba(255,0,0,0.7);
        }

        .undamaged {
            background: rgba(0,255,0,0.6);
            color: black;
        }

        .error {
            margin-top: 15px;
            color: #ffcccc;
        }

        img {
            margin-top: 15px;
            width: 100%;
            border-radius: 15px;
        }

        .spinner {
            display: none;
            margin-top: 10px;
        }
    </style>

    <script>
        function showSpinner() {
            document.getElementById("spinner").style.display = "block";
        }
    </script>
</head>
<body>

<div class="card">
    <h2>🚀 Pipe Damage Detection</h2>

    <form method="POST" enctype="multipart/form-data" onsubmit="showSpinner()">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    <div id="spinner" class="spinner">
        ⏳ Processing...
    </div>

    {% if error %}
        <div class="error">
            ❌ {{ error }}
        </div>
    {% endif %}

    {% if image_path %}
        <img src="{{ image_path }}">
    {% endif %}

    {% if prediction %}
        <div class="result {% if prediction == 'Damaged' %}damaged{% else %}undamaged{% endif %}">
            Prediction: {{ prediction }} <br>
            Confidence: {{ confidence }}%
        </div>
    {% endif %}
</div>

</body>
</html>
